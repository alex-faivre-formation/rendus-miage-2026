apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: miage-bank
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/hanja19/miage-bank-projet.git
    targetRevision: main
    path: "Partie B/miage-bank"
    helm:
      releaseName: miage-bank
  destination:
    server: https://kubernetes.default.svc
    namespace: miage-bank
  syncPolicy:
    automated:
      prune: true       # supprime les ressources retirées du chart
      selfHeal: true    # corrige toute dérive manuelle automatiquement
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      