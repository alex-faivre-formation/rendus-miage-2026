# ============================================================
# DÉCISION DOCUMENTÉE — Gestion des secrets
#
# Approche retenue : Secret Kubernetes natif (stringData).
# Les credentials sont fournis via values-secrets.yaml (gitignore)
# ou --set au moment du déploiement.
#
# Approche recommandée en production :
#   HashiCorp Vault + External Secrets Operator (ESO).
#   Un exemple de configuration ESO est fourni dans
#   Partie B/01-infrastructure/external-secret.yaml.
#
# Raison de la décision : l'installation et la configuration
# complète de Vault + ESO dépassent le périmètre du délai imparti.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "miage-bank.fullname" . }}-db-secret
  namespace: {{ .Values.namespaceName }}
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
  annotations:
    production-approach: "HashiCorp Vault + External Secrets Operator"
type: Opaque
stringData:
  # Passwords injectés depuis values-secrets.yaml (gitignore)
  # Commande de déploiement :
  #   helm install miage-bank . -n miage-bank \
  #     --set secrets.mysqlRootPassword=<pwd> \
  #     --set secrets.mongoRootPassword=<pwd>
  SPRING_DATASOURCE_PASSWORD: {{ .Values.secrets.mysqlRootPassword | default "root" | quote }}
  SPRING_DATA_MONGODB_PASSWORD: {{ .Values.secrets.mongoRootPassword | default "root" | quote }}
  MYSQL_ROOT_PASSWORD: {{ .Values.secrets.mysqlRootPassword | default "root" | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ .Values.secrets.mongoRootPassword | default "root" | quote }}
