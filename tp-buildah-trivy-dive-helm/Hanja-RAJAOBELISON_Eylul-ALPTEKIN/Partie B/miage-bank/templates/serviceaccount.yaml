apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "miage-bank.serviceAccountName" . }}
  namespace: {{ .Values.namespaceName }}
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
---
# Role minimaliste : lecture seule sur les ressources nécessaires
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "miage-bank.fullname" . }}-role
  namespace: {{ .Values.namespaceName }}
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "miage-bank.fullname" . }}-rolebinding
  namespace: {{ .Values.namespaceName }}
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "miage-bank.serviceAccountName" . }}
    namespace: {{ .Values.namespaceName }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "miage-bank.fullname" . }}-role
