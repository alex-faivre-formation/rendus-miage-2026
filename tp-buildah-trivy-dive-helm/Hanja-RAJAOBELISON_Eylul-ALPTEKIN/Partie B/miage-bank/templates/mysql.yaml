{{- if .Values.databases.mysql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: {{ .Values.namespaceName }}
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        {{- include "miage-bank.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "miage-bank.serviceAccountName" . }}
      containers:
        - name: mysql
          image: {{ .Values.databases.mysql.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: {{ .Values.databases.mysql.port }}
          env:
            - name: MYSQL_DATABASE
              value: {{ .Values.databases.mysql.database | quote }}
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "miage-bank.fullname" . }}-db-secret
                  key: MYSQL_ROOT_PASSWORD
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: {{ .Values.namespaceName }}
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-mysql
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
    - name: mysql
      port: {{ .Values.databases.mysql.port }}
      targetPort: {{ .Values.databases.mysql.port }}
{{- end }}
