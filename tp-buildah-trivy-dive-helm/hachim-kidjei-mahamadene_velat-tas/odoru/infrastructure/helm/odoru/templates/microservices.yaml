{{- $root := . }}

{{- range $serviceKey, $service := dict
  "memberService" .Values.services.memberService
  "courseService" .Values.services.courseService
  "competitionService" .Values.services.competitionService
  "badgeService" .Values.services.badgeService
  "statisticsService" .Values.services.statisticsService
}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $service.name }}
  namespace: {{ $root.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: odoru
    app.kubernetes.io/component: microservice
    app.kubernetes.io/instance: {{ $service.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $service.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odoru
        app.kubernetes.io/component: microservice
        app.kubernetes.io/instance: {{ $service.name }}
    spec:
      serviceAccountName: {{ $root.Values.security.serviceAccount.name }}
      containers:
        - name: {{ $service.name }}
          image: "{{ $root.Values.image.registry }}/{{ $service.image }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $service.port }}

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $service.port }}
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              cpu: {{ $root.Values.resources.spring.requests.cpu | quote }}
              memory: {{ $root.Values.resources.spring.requests.memory | quote }}
            limits:
              cpu: {{ $root.Values.resources.spring.limits.cpu | quote }}
              memory: {{ $root.Values.resources.spring.limits.memory | quote }}

          env:
            - name: SERVER_PORT
              value: {{ $service.port | quote }}

            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"

            - name: SPRING_APPLICATION_JSON
              value: '{"eureka":{"client":{"service-url":{"defaultZone":"http://discovery-service:8761/eureka/"}}}}'

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka/"

            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE
              value: "http://discovery-service:8761/eureka/"

            - name: KEYCLOAK_AUTH_SERVER_URL
              value: "http://keycloak:8080"

            - name: MEMBER_SERVICE_BASE_URL
              value: "http://member-service:8081"

            - name: COURSE_SERVICE_BASE_URL
              value: "http://course-service:8082"

            - name: COMPETITION_SERVICE_BASE_URL
              value: "http://competition-service:8083"

            - name: BADGE_SERVICE_BASE_URL
              value: "http://badge-service:8084"

            - name: STATISTICS_SERVICE_BASE_URL
              value: "http://statistics-service:8085"

            {{- if $service.database }}
            {{- $db := index $root.Values.postgres.databases $service.database }}
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ $db.serviceName }}:{{ $db.port }}/{{ $db.name }}"

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: odoru-postgres-secret
                  key: POSTGRES_USER

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoru-postgres-secret
                  key: POSTGRES_PASSWORD
            {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $service.name }}
  namespace: {{ $root.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: odoru
    app.kubernetes.io/component: microservice
    app.kubernetes.io/instance: {{ $service.name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ $service.name }}
  ports:
    - name: http
      port: {{ $service.port }}
      targetPort: {{ $service.port }}
{{- end }}
