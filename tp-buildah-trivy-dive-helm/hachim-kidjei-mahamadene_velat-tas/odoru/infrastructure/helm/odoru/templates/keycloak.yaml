apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.keycloak.serviceName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: odoru
    app.kubernetes.io/component: identity-provider
    app.kubernetes.io/instance: {{ .Values.keycloak.serviceName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Values.keycloak.serviceName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odoru
        app.kubernetes.io/component: identity-provider
        app.kubernetes.io/instance: {{ .Values.keycloak.serviceName }}
    spec:
      serviceAccountName: {{ .Values.security.serviceAccount.name }}
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image }}
          imagePullPolicy: IfNotPresent
          args:
{{- range .Values.keycloak.command }}
            - {{ . | quote }}
{{- end }}
          ports:
            - containerPort: {{ .Values.keycloak.port }}

          startupProbe:
            tcpSocket:
              port: {{ .Values.keycloak.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 90

          readinessProbe:
            tcpSocket:
              port: {{ .Values.keycloak.port }}
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30

          livenessProbe:
            tcpSocket:
              port: {{ .Values.keycloak.port }}
            initialDelaySeconds: 300
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              cpu: {{ .Values.resources.keycloak.requests.cpu | quote }}
              memory: {{ .Values.resources.keycloak.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.keycloak.limits.cpu | quote }}
              memory: {{ .Values.resources.keycloak.limits.memory | quote }}

          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: odoru-keycloak-secret
                  key: KEYCLOAK_ADMIN

            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoru-keycloak-secret
                  key: KEYCLOAK_ADMIN_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.keycloak.serviceName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: odoru
    app.kubernetes.io/component: identity-provider
    app.kubernetes.io/instance: {{ .Values.keycloak.serviceName }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Values.keycloak.serviceName }}
  ports:
    - name: http
      port: {{ .Values.keycloak.port }}
      targetPort: {{ .Values.keycloak.port }}
