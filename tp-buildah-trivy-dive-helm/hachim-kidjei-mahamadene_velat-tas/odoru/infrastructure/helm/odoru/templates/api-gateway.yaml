apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.apiGateway.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: odoru
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/instance: {{ .Values.services.apiGateway.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Values.services.apiGateway.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odoru
        app.kubernetes.io/component: api-gateway
        app.kubernetes.io/instance: {{ .Values.services.apiGateway.name }}
    spec:
      serviceAccountName: {{ .Values.security.serviceAccount.name }}
      containers:
        - name: {{ .Values.services.apiGateway.name }}
          image: "{{ .Values.image.registry }}/{{ .Values.services.apiGateway.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.apiGateway.port }}

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.services.apiGateway.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.services.apiGateway.port }}
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              cpu: {{ .Values.resources.spring.requests.cpu | quote }}
              memory: {{ .Values.resources.spring.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.spring.limits.cpu | quote }}
              memory: {{ .Values.resources.spring.limits.memory | quote }}

          env:
            - name: SERVER_PORT
              value: {{ .Values.services.apiGateway.port | quote }}

            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"

            - name: SPRING_APPLICATION_JSON
              value: '{"eureka":{"client":{"service-url":{"defaultZone":"http://discovery-service:8761/eureka/"}}}}'

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka/"

            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE
              value: "http://discovery-service:8761/eureka/"

            - name: KEYCLOAK_AUTH_SERVER_URL
              value: "http://keycloak:8080"

            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: "http://keycloak:8080/realms/odoru/protocol/openid-connect/certs"

            - name: MEMBER_SERVICE_BASE_URL
              value: "http://member-service:8081"

            - name: COURSE_SERVICE_BASE_URL
              value: "http://course-service:8082"

            - name: COMPETITION_SERVICE_BASE_URL
              value: "http://competition-service:8083"

            - name: BADGE_SERVICE_BASE_URL
              value: "http://badge-service:8084"

            - name: STATISTICS_SERVICE_BASE_URL
              value: "http://statistics-service:8085"

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.apiGateway.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: odoru
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/instance: {{ .Values.services.apiGateway.name }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: {{ .Values.services.apiGateway.name }}
  ports:
    - name: http
      port: {{ .Values.services.apiGateway.port }}
      targetPort: {{ .Values.services.apiGateway.port }}
      nodePort: {{ .Values.services.apiGateway.nodePort }}
