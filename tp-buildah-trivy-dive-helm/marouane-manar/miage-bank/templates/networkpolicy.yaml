apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "miage-bank.fullname" . }}-network-policy
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
spec:
  # Sélectionne tous les pods du namespace (on va refuser tout le trafic entrant par défaut)
  podSelector: {} 
  policyTypes:
    - Ingress
  ingress:
    # on autorise la communication entre les pods du namespace (obligatoire pour le fonctionnement de l'application)
    - from:
        - podSelector: {}
    # on autorise le contrôleur externe (Minikube/Traefik) à envoyer du trafic HTTP (obligatoire pour l'accès externe)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system 
