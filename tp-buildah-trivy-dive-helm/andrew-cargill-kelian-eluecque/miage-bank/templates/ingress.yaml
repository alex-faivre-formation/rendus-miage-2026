{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: miage-bank-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app: apigateway
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}

  # Règles de routage du trafic HTTP
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apigateway # Redirection vers la gateway
                port:
                  number: {{ .Values.microservices.apigateway.port }} # Récupération dynamique du port
{{- end }}
