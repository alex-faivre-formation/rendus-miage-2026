# 1. Création de l'identité (ServiceAccount)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.global.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: miage-bank
---

# 2. Définition des permissions (Role) - Principe de Moindre Privilège
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.global.serviceAccountName }}-role
  namespace: {{ .Release.Namespace }}
rules:
  # Règle minimaliste : autorise uniquement la lecture des ConfigMaps dans ce namespace
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]

---

# 3. Association de l'identité et des permissions (RoleBinding)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.global.serviceAccountName }}-binding
  namespace: {{ .Release.Namespace }}
subjects:
  # À qui s'applique ce rôle ? -> Au ServiceAccount créé plus haut
  - kind: ServiceAccount
    name: {{ .Values.global.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  # Quel rôle appliquer ? -> Le rôle créé plus haut
  kind: Role
  name: {{ .Values.global.serviceAccountName }}-role
  apiGroup: rbac.authorization.k8s.io
