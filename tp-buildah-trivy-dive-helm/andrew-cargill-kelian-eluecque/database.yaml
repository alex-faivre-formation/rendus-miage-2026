---
# ==========================================
# 1. BASE DE DONNÉES MYSQL (Pour clientservice)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: bnkmysql
spec:
  ports:
    - port: 3306
  selector:
    app: bnkmysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bnkmysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bnkmysql
  template:
    metadata:
      labels:
        app: bnkmysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: mysql-password
            - name: MYSQL_DATABASE
              value: "banquebd"
          ports:
            - containerPort: 3306

---
# ==========================================
# 2. BASE DE DONNÉES MONGODB (Pour compteservice)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: bnkmongo
spec:
  ports:
    - port: 27017
  selector:
    app: bnkmongo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bnkmongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bnkmongo
  template:
    metadata:
      labels:
        app: bnkmongo
    spec:
      containers:
        - name: mongo
          image: mongo:5.0
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: mongo-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: mongo-password
          ports:
            - containerPort: 27017
