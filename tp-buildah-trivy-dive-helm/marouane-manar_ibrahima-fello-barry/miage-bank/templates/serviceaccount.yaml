apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "miage-bank.fullname" . }}-sa
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "miage-bank.fullname" . }}-role
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
rules:
  # principe des moindre privilèges (best practice)
  - apiGroups: [""]
    resources: ["pods", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "miage-bank.fullname" . }}-rolebinding
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "miage-bank.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "miage-bank.fullname" . }}-sa
    namespace: {{ .Values.global.namespace }}
